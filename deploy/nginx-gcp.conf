# Nginx 站点配置 · GCP（纯 IP + HTTP，首版无 HTTPS）
#
# 安装位置：/etc/nginx/sites-available/gcp
# 启用：sudo ln -sf /etc/nginx/sites-available/gcp /etc/nginx/sites-enabled/gcp
# 验证 + reload：sudo nginx -t && sudo systemctl reload nginx
#
# 详见 docs/engineering/01-技术方案.md §11.1 步骤 9 与 §11.4。
#
# 权限提示：worker 进程用户（常见 www-data）须能「进入」/opt/gcp 路径链并对
# /opt/gcp/frontend/dist 内文件有读权限；否则访问 / 会得到 403。部署脚本会 chmod 处理。

server {
    listen 80 default_server;
    server_name _;

    root /opt/gcp/frontend/dist;
    index index.html;

    client_max_body_size 2m;

    # 业务 API 反代至 Uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # 与技术方案 §11.6 超时链对齐：Nginx 180s
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 30s;
    }

    # 调试页（与 C 端解耦的独立 HTML）
    # 文件位置：/opt/gcp/backend/app/debug_ui/index.html
    location /debug/ {
        alias /opt/gcp/backend/app/debug_ui/;
        index index.html;
        try_files $uri $uri/ /debug/index.html;
    }

    # 前端 SPA 路由 fallback（任何未匹配路径都回到 index.html）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Nginx 短连接 keep-alive（与 §11.6 一致）
    keepalive_timeout 90s;

    # 简单的 gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 512;
}
